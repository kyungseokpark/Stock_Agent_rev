name: daily-screen

on:
  schedule:
    - cron: "30 7 * * 1-5"  # 16:30 KST, after KR close
    - cron: "0 23 * * 1-5"  # 08:00 KST, after US close
  workflow_dispatch:
    inputs:
      market:
        description: "us, kr, or both"
        default: "both"
        type: choice
        options:
          - both
          - us
          - kr
      run_backtest:
        description: "Run offline US backtest after screening"
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: daily-screen-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select market
        id: select
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            market="${{ inputs.market }}"
            backtest="${{ inputs.run_backtest }}"
          elif [[ "${{ github.event.schedule }}" == "30 7 * * 1-5" ]]; then
            market="kr"
            backtest="false"
          else
            market="us"
            backtest="false"
          fi
          echo "market=${market}" >> "$GITHUB_OUTPUT"
          echo "run_backtest=${backtest}" >> "$GITHUB_OUTPUT"
          echo "Selected market: ${market}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore OHLCV and flow cache
        uses: actions/cache@v4
        with:
          path: |
            data/cache/ohlcv
            data/cache/flow
          key: stock-cache-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('configs/*.yaml', 'data/*.csv', 'tickers*.csv') }}-${{ github.run_number }}
          restore-keys: |
            stock-cache-${{ runner.os }}-${{ github.ref_name }}-${{ hashFiles('configs/*.yaml', 'data/*.csv', 'tickers*.csv') }}-
            stock-cache-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run daily screening
        run: python main.py --market "${{ steps.select.outputs.market }}" --auto --notify telegram

      - name: Run optional offline backtest
        if: ${{ steps.select.outputs.run_backtest == 'true' }}
        run: python run_us_backtest.py --label "ci_${{ github.run_number }}" --offline

      - name: Build report site
        run: python scripts/build_report_site.py --output-dir public

      - name: Upload run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-screen-${{ steps.select.outputs.market }}-${{ github.run_number }}
          path: |
            output/
            public/
            data/screener_history.db
            logs/run.log
          if-no-files-found: warn
          retention-days: 90

      - name: Commit generated state
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output
          git add -f data/screener_history.db logs/run.log
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore: update daily screening outputs [skip ci]"
            git push
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify failure via Telegram
        if: ${{ failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        shell: bash
        run: |
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=Stock Agent screening failed: ${run_url}"
